name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  # Each OS job tests the targets only it can run and stages its JVM JNI
  # binary; the publish job merges every staged binary into the jvm jar.
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - name: Build and test (linuxX64, jvm, android assemble, mingw compile)
        run: ./gradlew linuxX64Test jvmTest assembleRelease compileKotlinMingwX64
      - uses: actions/upload-artifact@v4
        with:
          name: jni-linux-x86_64
          path: build/jniStaging/
          if-no-files-found: error

  linux-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - name: Build and test JVM on arm64
        run: ./gradlew jvmTest
      - uses: actions/upload-artifact@v4
        with:
          name: jni-linux-aarch64
          path: build/jniStaging/
          if-no-files-found: error

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - name: Build and test (macOS, iOS simulator, jvm)
        run: ./gradlew macosArm64Test iosSimulatorArm64Test jvmTest compileKotlinIosArm64
      - uses: actions/upload-artifact@v4
        with:
          name: jni-macos
          path: build/jniStaging/
          if-no-files-found: error

  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - uses: msys2/setup-msys2@v2
        id: msys2
        with:
          msystem: MINGW64
          install: mingw-w64-x86_64-gcc
      - name: Expose MinGW gcc to Gradle
        shell: bash
        run: echo "${{ steps.msys2.outputs.msys2-location }}/mingw64/bin" >> "$GITHUB_PATH"
      - name: Build and test (mingwX64, jvm)
        run: ./gradlew mingwX64Test jvmTest
      - uses: actions/upload-artifact@v4
        with:
          name: jni-windows-x86_64
          path: build/jniStaging/
          if-no-files-found: error

  android-emulator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
      - name: Run commonTest on an emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          script: ./gradlew connectedDebugAndroidTest

  # Publishing runs on macOS because only a macOS host can process the
  # cinterop for every Kotlin/Native target (Apple sysroots are macOS-only,
  # while the Linux and MinGW sysroots ship with the toolchain everywhere).
  # The staged JVM binaries from every OS are merged into the jvm jar first.
  publish:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [linux, linux-arm64, macos, windows]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: gradle/actions/setup-gradle@v6
      - name: Collect JVM native libraries from all runners
        uses: actions/download-artifact@v4
        with:
          pattern: jni-*
          path: build/jniStaging/
          merge-multiple: true
      - name: Publish all targets to Maven Central
        run: ./gradlew publishToMavenCentral
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyId: ${{ secrets.SIGNING_IN_MEMORY_KEY_ID }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
